<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>客户级 family(可交互)</title>
<style>
  :root{
    --canvas:#eef3ef;--card:#fff;--ink:#1f2620;--ink2:#6e7a70;--ink3:#9ba59b;
    --green:#4e9a6b;--green-bg:#e8f1ea;--green-deep:#2e6a48;--gold:#e6a83a;
    --line:#eef2ef;--line-strong:#e6ece8;--coral-deep:#bb4a40;
    --fam:#5b56c9;--fam-bg:#eef1ff;
    --shadow:0 1px 2px rgba(31,38,32,.04),0 10px 26px rgba(31,38,32,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--canvas);font-family:"Noto Sans CJK SC","PingFang SC",sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;padding:22px;}
  .page{max-width:1160px;margin:0 auto;}
  .badge{font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:999px;white-space:nowrap;}

  /* family chip + tooltip */
  .famwrap{position:relative;display:inline-flex;align-items:center;cursor:default;}
  .famchip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--fam);background:var(--fam-bg);padding:3px 10px;border-radius:999px;border:1px dashed transparent;}
  .famwrap:hover .famchip{border-color:#c8c5f2;}
  .famchip svg{width:13px;height:13px;}
  .tip{position:absolute;top:132%;left:0;background:#20302a;color:#fff;border-radius:10px;padding:10px 12px;min-width:200px;box-shadow:0 12px 30px rgba(31,38,32,.28);opacity:0;visibility:hidden;transform:translateY(-4px);transition:.14s;z-index:40;}
  .famwrap:hover .tip{opacity:1;visibility:visible;transform:translateY(0);}
  .tip::before{content:"";position:absolute;top:-5px;left:20px;width:10px;height:10px;background:#20302a;transform:rotate(45deg);}
  .tip .th{font-size:11px;color:#9fb4a8;margin-bottom:8px;}
  .tip .tr{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:4px 0;}
  .tip .tr .tn{font-size:13px;font-weight:600;}
  .tip .tr a.tn{color:#a9d8bd;text-decoration:none;border-bottom:1px dashed transparent;cursor:pointer;}
  .tip .tr a.tn:hover{color:#cdeed9;border-bottom-color:#7fbf9a;}
  .tip .tr .tk{font-size:11.5px;color:#bcd0c4;background:rgba(255,255,255,.1);padding:2px 8px;border-radius:6px;}
  .tip .foot{font-size:10.5px;color:#8fa89a;margin-top:8px;padding-top:7px;border-top:1px solid rgba(255,255,255,.12);}

  /* header */
  .header{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:18px 24px;display:flex;align-items:flex-start;gap:26px;margin-bottom:16px;}
  .idblk{display:flex;align-items:flex-start;gap:14px;flex:0 0 auto;width:250px;}
  .ava{width:52px;height:52px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0;}
  .nm{font-family:"Noto Serif CJK SC",serif;font-size:22px;font-weight:700;line-height:1.1;}
  .role{font-size:12.5px;color:var(--ink3);margin-top:2px;}
  .famUnderName{margin-top:8px;display:flex;align-items:center;gap:8px;}
  .mng{font-size:11.5px;font-weight:600;color:var(--fam);cursor:pointer;}
  .stats{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px 26px;}
  .st .k{font-size:12px;color:var(--ink2);font-weight:600;margin-bottom:6px;}
  .st .v{font-size:15px;font-weight:700;} .st .v.g{color:var(--green-deep);} .st .v.c{color:var(--coral-deep);}
  .st .sub{font-size:11px;color:var(--ink3);margin-top:3px;}
  .acts{flex:0 0 auto;display:flex;gap:10px;}
  .fav{font-size:13px;font-weight:600;color:var(--ink2);background:#fff;border:1px solid var(--line-strong);border-radius:999px;padding:9px 16px;}
  .edit{font-size:13px;font-weight:600;color:#fff;background:var(--green-deep);border:none;border-radius:999px;padding:9px 18px;}

  .panel{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:22px 24px;}
  .ptitle{font-family:"Noto Serif CJK SC",serif;font-size:17px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;}
  .ptitle .plus{margin-left:auto;width:30px;height:30px;border-radius:50%;background:var(--green-bg);color:var(--green-deep);display:flex;align-items:center;justify-content:center;}.ptitle .plus svg{width:15px;height:15px;}
  .tabs{display:flex;gap:10px;margin-bottom:6px;}
  .tab{padding:8px 16px;border-radius:999px;border:1px solid var(--line-strong);background:#fff;cursor:pointer;}
  .tab.on{background:var(--green-deep);border-color:var(--green-deep);}
  .tab .ty{font-size:13.5px;font-weight:600;}.tab.on .ty{color:#fff;}
  .tabhint{font-size:11.5px;color:var(--ink3);margin:8px 2px 0;}
  .divider{height:1px;background:var(--line);margin:14px 0;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:0 40px;}
  .fld{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--line);}
  .fld .k{font-size:13px;font-weight:600;} .fld .v{font-size:13px;} .fld .v.muted{color:var(--ink3);}
  .tag-cat{font-size:11.5px;font-weight:600;color:var(--green-deep);background:var(--green-bg);padding:3px 9px;border-radius:7px;}
  .ppl{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
  .chipP{font-size:12px;font-weight:600;color:var(--ink);background:#eef2ef;padding:3px 10px;border-radius:7px;}
  .addp{font-size:12.5px;font-weight:600;color:var(--green-deep);cursor:pointer;}
  .full{grid-column:1/-1;}

  /* modal */
  .mask{position:fixed;inset:0;background:rgba(31,38,32,.32);display:none;align-items:center;justify-content:center;z-index:50;}
  .mask.on{display:flex;}
  .modal{background:#fff;border-radius:16px;width:380px;max-width:92vw;padding:22px;box-shadow:0 24px 60px rgba(31,38,32,.3);}
  .modal h3{font-family:"Noto Serif CJK SC",serif;font-size:17px;font-weight:700;}
  .modal .msub{font-size:12px;color:var(--ink3);margin:4px 0 16px;}
  .curfam{margin-bottom:16px;}
  .cf{display:flex;align-items:center;gap:8px;background:#f7f7fb;border-radius:9px;padding:8px 11px;margin-bottom:7px;}
  .cf .cfn{font-size:13px;font-weight:600;} .cf .cfr{font-size:11px;color:var(--ink2);background:#eceaf6;padding:2px 8px;border-radius:6px;}
  .cf .cflink{font-size:10.5px;color:var(--fam);margin-left:2px;} .cf .cfx{margin-left:auto;color:var(--ink3);cursor:pointer;font-size:15px;}
  .mfield{margin-bottom:13px;} .mfield label{display:block;font-size:12.5px;font-weight:600;margin-bottom:7px;}
  .mfield input{width:100%;height:42px;border:1px solid var(--line-strong);border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;}
  .mfield input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(78,154,107,.14);}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
  .rchip{font-size:12px;font-weight:600;color:var(--ink2);background:#f1f5f2;border:1px solid transparent;padding:5px 12px;border-radius:999px;cursor:pointer;}
  .rchip.on{background:var(--green-bg);color:var(--green-deep);border-color:#bcdcc7;}
  .mtiny{font-size:11px;color:var(--ink3);margin-top:6px;}
  .mft{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
  .mghost{font-size:13px;color:var(--ink2);background:none;border:none;cursor:pointer;padding:9px 14px;}
  .msave{font-size:13px;font-weight:600;color:#fff;background:var(--green-deep);border:none;border-radius:9px;padding:9px 20px;cursor:pointer;}
  .note{max-width:1160px;margin:10px auto 0;font-size:11.5px;color:var(--ink3);line-height:1.6;}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="idblk"><span class="ava">测</span>
      <div><div class="nm">测试</div><div class="role">客户</div>
        <div class="famUnderName" id="famHeader"></div>
      </div>
    </div>
    <div class="stats">
      <div class="st"><div class="k">参与案件</div><div class="v g">3 件 ›</div><div class="sub">一案一组</div></div>
      <div class="st"><div class="k">性别 · 生日</div><div class="v">男</div></div>
      <div class="st"><div class="k">归属人</div><div class="v">Q</div></div>
    </div>
    <div class="acts"><button class="fav">☆ 收藏</button><button class="edit">编辑客户</button></div>
  </div>

  <div class="panel">
    <div class="ptitle">相关案件 <span class="plus"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></span></div>
    <div class="tabs" id="tabs"></div>
    <div class="tabhint">family 是这个客户的,和案件无关 —— 切到任意案件,大名字下的 family 始终显示;有「参与客户」行的案件里也带 family。</div>
    <div class="divider"></div>
    <div id="detail"></div>
  </div>
</div>

<div class="mask" id="mask">
  <div class="modal">
    <h3>客户 family(家庭成员)</h3>
    <div class="msub">属于这个客户 · 全客户页面通用 · 不建档、不进账目</div>
    <div class="curfam" id="curfam"></div>
    <div class="mfield"><label>名字</label><input id="fname" placeholder="家庭成员姓名"></div>
    <div class="mfield"><label>关系</label><input id="frel" placeholder="选择或手填,如:配偶"><div class="chips" id="relChips"></div><div class="mtiny">点预设或直接手填</div></div>
    <div class="mft"><button class="mghost" id="famCancel">关闭</button><button class="msave" id="famSave">添加</button></div>
  </div>
</div>

<div class="note">点大名字下的「管理」加 family;加完看:大名字下、以及每个有参与客户行的案件里都同步出现。切换上方案件 tab,family 不变(它属于客户,不属于案件)。气泡里有档案的名字可点跳档案。</div>

<script>
const el=id=>document.getElementById(id);
const RELS=['配偶','子女','父母','兄弟姐妹','其他'];
const userIcon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/></svg>';

// ★客户级★ family(不挂 case)
let family=[ {name:'王璜', rel:'配偶', profileId:'cust_wh'}, {name:'小明', rel:'子女', profileId:null} ];
let relSel='';

// 案件(仅示意:有的有参与客户行,有的没有——如职业评估单人)
const cases=[
  {tab:'482', cat:'配偶签证', typeEn:'Partner Visa', hasPart:true, fields:[['用途','配偶签证申请'],['货币','AUD']], parts:['测试']},
  {tab:'职业评估', cat:'职业评估', typeEn:'Skill Assessment', hasPart:false, fields:[['评估机构','VETASSESS'],['评估职位','ANZSCO 职位名称','muted']]},
  {tab:'De Facto', cat:'De Facto 关系认定', typeEn:'De Facto', hasPart:true, fields:[['用途','配合签证申请'],['货币','AUD']], parts:['测试']},
];
let active=2;

function famChip(){
  if(!family.length) return '';
  const rows=family.map(f=>{
    const nm=f.profileId?`<a class="tn" data-go="${f.profileId}">${f.name}</a>`:`<span class="tn">${f.name}</span>`;
    return `<div class="tr">${nm}<span class="tk">${f.rel}</span></div>`;
  }).join('');
  const foot=family.some(f=>!f.profileId)?'<div class="foot">带下划线的可点开档案;无档案为纯记录</div>':'';
  return `<span class="famwrap"><span class="famchip">${userIcon} family · ${family.length}</span><div class="tip"><div class="th">家庭成员</div>${rows}${foot}</div></span>`;
}
function renderHeader(){ el('famHeader').innerHTML = famChip() + (family.length?'':'') + `<span class="mng" id="mng">${family.length?'管理':'+ family'}</span>`; el('mng').onclick=openModal; }
function renderTabs(){ el('tabs').innerHTML=cases.map((c,i)=>`<div class="tab ${i===active?'on':''}" data-i="${i}"><span class="ty">${c.tab}</span></div>`).join(''); }
function renderDetail(){
  const c=cases[active];
  const partRow=c.hasPart
    ? `<div class="fld full" style="border-bottom:none"><span class="k">参与客户</span><span class="v ppl">${c.parts.map(p=>`<span class="chipP">${p}</span>`).join('')}${famChip()}<span class="addp">+ 添加参与人</span></span></div>`
    : '';
  el('detail').innerHTML=`
    <div class="grid">
      <div class="fld"><span class="k">案件大类</span><span class="v"><span class="tag-cat">${c.cat}</span></span></div>
      <div class="fld"><span class="k">案件类型</span><span class="v">${c.typeEn}</span></div>
      ${c.fields.map(f=>`<div class="fld"><span class="k">${f[0]}</span><span class="v ${f[2]||''}">${f[1]}</span></div>`).join('')}
      ${partRow}
    </div>
    ${c.hasPart?'':'<div class="tabhint" style="margin-top:10px">(职业评估为单人案件,无「参与客户」行;但客户 family 仍显示在上方大名字下)</div>'}`;
}
function renderAll(){ renderHeader(); renderTabs(); renderDetail(); }

// modal
function renderCurFam(){ el('curfam').innerHTML = family.length? family.map((f,i)=>`<div class="cf"><span class="cfn">${f.name}</span><span class="cfr">${f.rel}</span>${f.profileId?'<span class="cflink">· 有档案</span>':''}<span class="cfx" data-del="${i}">×</span></div>`).join('') : '<div style="font-size:12px;color:var(--ink3)">暂无 family</div>'; }
function renderRelChips(){ el('relChips').innerHTML=RELS.map(r=>`<span class="rchip ${r===relSel?'on':''}" data-rel="${r}">${r}</span>`).join(''); }
function openModal(){ el('fname').value=''; el('frel').value=''; relSel=''; renderRelChips(); renderCurFam(); el('mask').classList.add('on'); }
el('famCancel').onclick=()=>el('mask').classList.remove('on');
el('mask').onclick=e=>{ if(e.target===el('mask')) el('mask').classList.remove('on'); };
el('relChips').onclick=e=>{ const c=e.target.closest('[data-rel]'); if(!c)return; relSel=c.dataset.rel; el('frel').value=relSel; renderRelChips(); };
el('frel').oninput=()=>{ relSel=RELS.includes(el('frel').value)?el('frel').value:''; renderRelChips(); };
el('famSave').onclick=()=>{ const n=el('fname').value.trim(), r=el('frel').value.trim(); if(!n){alert('请填名字');return;} if(!r){alert('请填/选关系');return;} family.push({name:n,rel:r,profileId:null}); el('fname').value='';el('frel').value='';relSel=''; renderRelChips(); renderCurFam(); renderAll(); };
el('curfam').addEventListener('click',e=>{ const d=e.target.closest('[data-del]'); if(!d)return; family.splice(+d.dataset.del,1); renderCurFam(); renderAll(); });

// tab switch + 气泡名字跳转
document.addEventListener('click',e=>{
  const tab=e.target.closest('.tab'); if(tab){active=+tab.dataset.i; renderDetail(); renderTabs(); return;}
  const go=e.target.closest('[data-go]'); if(go){ alert('跳转到客户档案:'+go.dataset.go+'  (实际接 /customers/'+go.dataset.go+')'); }
});
renderAll();
</script>
</body>
</html>
