<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Family 家庭成员(可交互)</title>
<style>
  :root{
    --canvas:#eef3ef;--card:#fff;--ink:#1f2620;--ink2:#6e7a70;--ink3:#9ba59b;
    --green:#4e9a6b;--green-bg:#e8f1ea;--green-deep:#2e6a48;--gold:#e6a83a;
    --line:#eef2ef;--line-strong:#e6ece8;
    --shadow:0 1px 2px rgba(31,38,32,.04),0 10px 26px rgba(31,38,32,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--canvas);font-family:"Noto Sans CJK SC","PingFang SC",sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;padding:26px 16px;}
  .stack{max-width:820px;margin:0 auto;display:flex;flex-direction:column;gap:20px;}
  .panel{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:22px 24px;}
  .cap{font-size:12px;font-weight:700;color:var(--ink2);letter-spacing:.05em;margin-bottom:14px;}

  /* ===== 1. 客户详情:大名字 + family(hover) ===== */
  .cust{display:flex;align-items:center;gap:16px;}
  .cava{width:56px;height:56px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0;}
  .cust .nm{font-family:"Noto Serif CJK SC",serif;font-size:24px;font-weight:700;line-height:1.1;}
  .cust .role{font-size:13px;color:var(--ink3);margin-top:2px;}
  .famline{margin-top:7px;display:inline-flex;align-items:center;gap:6px;position:relative;cursor:default;}
  .famchip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--green-deep);background:var(--green-bg);padding:3px 10px;border-radius:999px;border:1px dashed transparent;}
  .famline:hover .famchip{border-color:#b7d6c2;}
  .famchip svg{width:13px;height:13px;}
  /* tooltip */
  .tip{position:absolute;top:130%;left:0;background:#20302a;color:#fff;border-radius:10px;padding:10px 12px;min-width:190px;box-shadow:0 12px 30px rgba(31,38,32,.28);opacity:0;visibility:hidden;transform:translateY(-4px);transition:.14s;z-index:30;}
  .famline:hover .tip{opacity:1;visibility:visible;transform:translateY(0);}
  .tip::before{content:"";position:absolute;top:-5px;left:22px;width:10px;height:10px;background:#20302a;transform:rotate(45deg);}
  .tip .th{font-size:11px;color:#9fb4a8;margin-bottom:8px;}
  .tip .tr{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:4px 0;}
  .tip .tr .tn{font-size:13px;font-weight:600;}
  .tip .tr .tk{font-size:11.5px;color:#bcd0c4;background:rgba(255,255,255,.1);padding:2px 8px;border-radius:6px;}
  .hint{font-size:11.5px;color:var(--ink3);margin-top:14px;}

  /* ===== 2. group:添加参与人 + family ===== */
  .grpbox{border:1px solid var(--line-strong);border-radius:12px;padding:16px;}
  .ghd{display:flex;align-items:center;margin-bottom:12px;}
  .ghd .t{font-family:"Noto Serif CJK SC",serif;font-size:15px;font-weight:700;}
  .ghd .code{margin-left:auto;font-size:11px;font-weight:600;color:var(--green-deep);background:var(--green-bg);padding:2px 9px;border-radius:999px;}
  .ghd .cnt{font-size:12px;color:var(--ink3);margin-left:8px;}
  .sub{font-size:12.5px;font-weight:600;color:var(--ink2);margin:6px 0 8px;}
  .pp{display:flex;align-items:center;gap:9px;background:#f7faf8;border-radius:9px;padding:10px 12px;margin-bottom:8px;}
  .pp .n{width:22px;height:22px;border-radius:50%;background:var(--green-bg);color:var(--green-deep);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
  .pp.fam .n{background:#eef1ff;color:#5b56c9;}
  .pp .rel{font-size:11px;font-weight:600;color:var(--ink2);background:#eef2ef;padding:2px 8px;border-radius:6px;margin-left:2px;}
  .pp .x{margin-left:auto;color:var(--ink3);cursor:pointer;font-size:16px;}
  .row1{display:flex;gap:10px;align-items:center;margin-top:4px;}
  .searchbox{flex:1;height:44px;border:1px solid var(--line-strong);border-radius:10px;display:flex;align-items:center;padding:0 14px;color:var(--ink3);font-size:13.5px;}
  .abtn{font-size:13px;font-weight:600;color:var(--ink2);background:#fff;border:1px solid var(--line-strong);border-radius:10px;height:44px;padding:0 14px;white-space:nowrap;cursor:pointer;}
  .abtn.fam{color:#5b56c9;border-color:#d7d5f2;}
  .tiny{font-size:11px;color:var(--ink3);margin-top:12px;}

  /* modal */
  .mask{position:fixed;inset:0;background:rgba(31,38,32,.32);display:none;align-items:center;justify-content:center;z-index:50;}
  .mask.on{display:flex;}
  .modal{background:#fff;border-radius:16px;width:360px;max-width:92vw;padding:22px;box-shadow:0 24px 60px rgba(31,38,32,.3);}
  .modal h3{font-family:"Noto Serif CJK SC",serif;font-size:17px;font-weight:700;margin-bottom:4px;}
  .modal .msub{font-size:12px;color:var(--ink3);margin-bottom:16px;}
  .mfield{margin-bottom:14px;}
  .mfield label{display:block;font-size:12.5px;font-weight:600;margin-bottom:7px;}
  .mfield input{width:100%;height:42px;border:1px solid var(--line-strong);border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;}
  .mfield input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(78,154,107,.14);}
  .relwrap{position:relative;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
  .rchip{font-size:12px;font-weight:600;color:var(--ink2);background:#f1f5f2;border:1px solid transparent;padding:5px 12px;border-radius:999px;cursor:pointer;}
  .rchip.on{background:var(--green-bg);color:var(--green-deep);border-color:#bcdcc7;}
  .mtiny{font-size:11px;color:var(--ink3);margin-top:6px;}
  .mft{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;}
  .mghost{font-size:13px;color:var(--ink2);background:none;border:none;cursor:pointer;padding:9px 14px;}
  .msave{font-size:13px;font-weight:600;color:#fff;background:var(--green-deep);border:none;border-radius:9px;padding:9px 20px;cursor:pointer;}
</style>
</head>
<body>
<div class="stack">

  <!-- 1. 客户详情大名字 + family -->
  <div class="panel">
    <div class="cap">客户详情 · 大名字下方显示 family(鼠标悬停看关系)</div>
    <div class="cust">
      <span class="cava">测</span>
      <div>
        <div class="nm">测试</div>
        <div class="role">客户</div>
        <div class="famline" id="famLine"><!-- family chip + tooltip 注入 --></div>
      </div>
    </div>
    <div class="hint">把鼠标移到「family」那颗标签上 → 悬浮气泡列出该客户 family 案件的成员及关系。(下方添加后这里会实时更新)</div>
  </div>

  <!-- 2. group 添加参与人 + family -->
  <div class="panel">
    <div class="cap">组(Group)· 添加参与人 / family</div>
    <div class="grpbox">
      <div class="ghd"><span class="t">组(Group)</span><span class="code">G-7ODC</span><span class="cnt" id="cnt">共 1 人</span></div>
      <div class="sub">本案参与人 / family</div>
      <div id="members"></div>
      <div class="sub" style="margin-top:14px">添加</div>
      <div class="row1">
        <div class="searchbox">搜索客户加入…</div>
        <button class="abtn">+ 新建客户</button>
        <button class="abtn fam" id="openFam">+ family</button>
      </div>
      <div class="tiny">● family 不建客户档案、不参与账目分账,只记录关系信息</div>
    </div>
  </div>
</div>

<!-- family modal -->
<div class="mask" id="mask">
  <div class="modal">
    <h3>添加 family</h3>
    <div class="msub">仅记录关系,不建客户档案、不参与账目</div>
    <div class="mfield"><label>名字</label><input id="fname" placeholder="家庭成员姓名"></div>
    <div class="mfield">
      <label>关系</label>
      <div class="relwrap">
        <input id="frel" placeholder="选择或手填,如:配偶">
        <div class="chips" id="relChips"></div>
        <div class="mtiny">点上面预设,或直接在框里手填</div>
      </div>
    </div>
    <div class="mft"><button class="mghost" id="famCancel">取消</button><button class="msave" id="famSave">保存</button></div>
  </div>
</div>

<script>
const el=id=>document.getElementById(id);
const RELS=['配偶','子女','父母','兄弟姐妹','其他'];
const userIcon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/></svg>';

let members=[ {name:'测试', kind:'client'} ];          // 组里的正式参与人(客户)
let family=[  {name:'王璜', rel:'配偶'} ];                // family 成员(关系信息)
let relSel='';

function renderMembers(){
  el('members').innerHTML =
    members.map(m=>`<div class="pp"><span class="n">${m.name[0]}</span><span>${m.name}</span></div>`).join('') +
    family.map((f,i)=>`<div class="pp fam"><span class="n">家</span><span>${f.name}</span><span class="rel">${f.rel}</span><span class="x" data-delfam="${i}">×</span></div>`).join('');
  el('cnt').textContent=`共 ${members.length} 人${family.length?` · family ${family.length}`:''}`;
}
function renderFamLine(){
  if(!family.length){ el('famLine').innerHTML=''; return; }
  const rows=family.map(f=>`<div class="tr"><span class="tn">${f.name}</span><span class="tk">${f.rel}</span></div>`).join('');
  el('famLine').innerHTML=`
    <span class="famchip">${userIcon} family · ${family.length}</span>
    <div class="tip"><div class="th">家庭成员</div>${rows}</div>`;
}
function renderRelChips(){ el('relChips').innerHTML=RELS.map(r=>`<span class="rchip ${r===relSel?'on':''}" data-rel="${r}">${r}</span>`).join(''); }
function renderAll(){ renderMembers(); renderFamLine(); }

// open/close modal
el('openFam').onclick=()=>{ el('fname').value=''; el('frel').value=''; relSel=''; renderRelChips(); el('mask').classList.add('on'); el('fname').focus(); };
el('famCancel').onclick=()=>el('mask').classList.remove('on');
el('mask').onclick=e=>{ if(e.target===el('mask')) el('mask').classList.remove('on'); };
// rel chips
el('relChips').onclick=e=>{ const c=e.target.closest('[data-rel]'); if(!c)return; relSel=c.dataset.rel; el('frel').value=relSel; renderRelChips(); };
el('frel').oninput=()=>{ relSel=RELS.includes(el('frel').value)?el('frel').value:''; renderRelChips(); };
// save
el('famSave').onclick=()=>{
  const name=el('fname').value.trim(); const rel=el('frel').value.trim();
  if(!name){alert('请填名字');return;} if(!rel){alert('请填/选关系');return;}
  family.push({name,rel}); el('mask').classList.remove('on'); renderAll();
};
// delete family
el('members').addEventListener('click',e=>{ const d=e.target.closest('[data-delfam]'); if(!d)return; family.splice(+d.dataset.delfam,1); renderAll(); });

renderAll();
</script>
</body>
</html>
