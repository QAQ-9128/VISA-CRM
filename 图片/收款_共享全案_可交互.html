<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>收款 · 共享(全案)费用(可交互)</title>
<style>
  :root{
    --canvas:#eef3ef;--card:#fff;--ink:#1f2620;--ink2:#6e7a70;--ink3:#9ba59b;
    --green:#4e9a6b;--green-bg:#e8f1ea;--green-deep:#2e6a48;
    --amber:#b0801f;--amber-bg:#f6eed9;--coral-deep:#bb4a40;
    --line:#eef2ef;--line-strong:#e6ece8;--gold:#e6a83a;
    --shadow:0 1px 2px rgba(31,38,32,.04),0 10px 26px rgba(31,38,32,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--canvas);font-family:"Noto Sans CJK SC","PingFang SC",sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;padding:24px 14px;}
  .panel{max-width:460px;margin:0 auto;background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:20px;}
  .num{font-variant-numeric:tabular-nums;}
  .badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;white-space:nowrap;}

  .fee-hd{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
  .fee-hd .t{font-family:"Noto Serif CJK SC",serif;font-size:16px;font-weight:700;}
  .pill{font-size:11px;font-weight:600;color:var(--green-deep);background:var(--green-bg);padding:2px 9px;border-radius:999px;}
  .sec-t{font-size:12px;font-weight:700;color:var(--ink2);letter-spacing:.06em;margin:0 0 10px;}

  .grp{border:1px solid var(--line-strong);border-radius:12px;overflow:hidden;margin-bottom:14px;}
  .grp-hd{display:flex;align-items:center;gap:9px;padding:11px 14px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;}
  .gava{width:26px;height:26px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
  .gava.sh{background:var(--green-bg);color:var(--green-deep);}
  .gava.sh svg{width:15px;height:15px;}
  .grp-hd .nm{font-size:13.5px;font-weight:600;}
  .grp-hd .sub{font-size:11px;color:var(--ink3);}
  .grp-hd .chev{margin-left:auto;color:var(--ink3);width:16px;height:16px;transition:transform .15s;}
  .grp.collapsed .chev{transform:rotate(-90deg);}
  .grp.collapsed .body{display:none;}

  .frow{padding:11px 14px;border-bottom:1px solid var(--line);}
  .fr1{display:flex;align-items:baseline;gap:8px;}
  .fr1 .dsc{font-size:13.5px;}
  .fr1 .shtag{font-size:10.5px;font-weight:600;color:var(--green-deep);background:var(--green-bg);padding:2px 7px;border-radius:6px;flex:0 0 auto;}
  .fr1 .amt{margin-left:auto;font-size:14px;font-weight:700;white-space:nowrap;flex:0 0 auto;color:var(--green-deep);}
  .fr2{margin-top:6px;}

  .gft{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fbfdfb;}
  .add{font-size:12.5px;font-weight:600;color:var(--green-deep);background:none;border:none;cursor:pointer;}
  .sm{font-size:11px;color:var(--ink2);} .sm b{color:var(--ink);} .sm .g{color:var(--green-deep);}

  /* entry form */
  .entry{padding:14px;background:var(--green-bg);border-top:1px solid #e3eee7;}
  .field{margin-bottom:10px;} .field:last-of-type{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--ink2);font-weight:600;margin-bottom:6px;}
  .seg{display:flex;border:1px solid var(--line-strong);border-radius:9px;overflow:hidden;background:#fff;}
  .seg button{flex:1;font-size:12.5px;font-weight:600;padding:8px 0;border:none;background:#fff;color:var(--ink2);cursor:pointer;}
  .seg button.on-green{background:var(--green-bg);color:var(--green-deep);} .seg button.on-amber{background:var(--amber-bg);color:var(--amber);}
  .ctl{width:100%;height:40px;border:1px solid #d7e2da;border-radius:10px;background:#fff;padding:0 12px;font-size:13.5px;font-family:inherit;}
  select.ctl{cursor:pointer;} input.amt-in{text-align:right;font-weight:600;font-variant-numeric:tabular-nums;}
  .ctl:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(78,154,107,.14);}
  .ehint{font-size:11px;color:var(--ink3);margin:-4px 0 10px;}
  .ft{display:flex;justify-content:flex-end;gap:8px;}
  .ghost{font-size:12.5px;color:var(--ink2);background:none;border:none;cursor:pointer;padding:8px 12px;}
  .save{font-size:12.5px;font-weight:600;color:#fff;background:var(--green-deep);border:none;border-radius:9px;padding:8px 18px;cursor:pointer;}
  .note{max-width:460px;margin:10px auto 0;font-size:11.5px;color:var(--ink3);line-height:1.6;}
</style>
</head>
<body>
<div class="panel">
  <div class="fee-hd"><span class="t">费用记录</span><span class="pill">482</span></div>
  <div class="sec-t">收款</div>
  <div id="groups"></div>
</div>
<div class="note">点任一分组的「添加款项」录入;「归属」可选具体客户或 <b>共享(全案)</b>。选共享 → 归到独立的「共享 · 全案」分组,不按个人分账,小计单列。</div>

<script>
const el=id=>document.getElementById(id);
const money=n=>Number(n||0).toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2});
let groups=[
  {id:'c_test', kind:'customer', name:'测试', avatar:'测', collapsed:false, items:[
    {desc:'订金', amount:2000, status:'received'},
  ]},
  {id:'shared', kind:'shared', name:'共享 · 全案', collapsed:false, items:[
    {desc:'政府申请费(全案)', amount:500, status:'received'},
  ]},
];
let entry=null; // {srcGroup, target, type:'received'|'pending', desc, amount}

const usersIcon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>';
const chev='<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>';

function subtotal(g){const total=g.items.reduce((s,i)=>s+i.amount,0);const recv=g.items.filter(i=>i.status==='received').reduce((s,i)=>s+i.amount,0);return{total,recv,owe:total-recv};}

function rowHTML(it,isShared){
  const st=it.status==='received'
    ? `<span class="badge" style="color:var(--green-deep);background:var(--green-bg)">已收款</span>`
    : `<span class="badge" style="color:var(--amber);background:var(--amber-bg)">待付款</span>`;
  return `<div class="frow"><div class="fr1">${isShared?'<span class="shtag">共享</span>':''}<span class="dsc">${it.desc}</span><span class="amt num">AUD ${money(it.amount)}</span></div><div class="fr2">${st}</div></div>`;
}

function entryHTML(g){
  if(!entry||entry.srcGroup!==g.id) return '';
  const e=entry;
  return `<div class="entry">
    <div class="field"><label>归属</label>
      <select class="ctl" data-e="target">
        <option value="c_test" ${e.target==='c_test'?'selected':''}>测试(客户)</option>
        <option value="shared" ${e.target==='shared'?'selected':''}>共享(全案)· 不分个人</option>
      </select>
    </div>
    ${e.target==='shared'?'<div class="ehint">该笔属于整个案件、不归任何客户,不参与按人分账。</div>':''}
    <div class="field"><label>类型</label>
      <div class="seg"><button class="${e.type==='received'?'on-green':''}" data-type="received">收款</button><button class="${e.type==='pending'?'on-amber':''}" data-type="pending">待付</button></div>
    </div>
    <div class="field"><label>描述</label><input class="ctl" data-e="desc" placeholder="选择 / 手填" value="${(e.desc||'').replace(/"/g,'&quot;')}"></div>
    <div class="field"><label>金额</label><input class="ctl amt-in" data-e="amount" inputmode="decimal" placeholder="0.00" value="${e.amount||''}"></div>
    <div class="ft"><button class="ghost" data-act="cancel">取消</button><button class="save" data-act="save">保存</button></div>
  </div>`;
}

function groupHTML(g){
  const s=subtotal(g);
  const isSh=g.kind==='shared';
  const ava=isSh?`<span class="gava sh">${usersIcon}</span>`:`<span class="gava">${g.avatar}</span>`;
  const sub=isSh?'<div class="sub">属于整个案件 · 不分个人</div>':'';
  return `<div class="grp ${g.collapsed?'collapsed':''}" data-g="${g.id}">
    <div class="grp-hd" data-toggle="${g.id}">${ava}<div><div class="nm">${g.name}</div>${sub}</div>${chev}</div>
    <div class="body">
      ${g.items.map(it=>rowHTML(it,isSh)).join('')}
      ${entryHTML(g)}
      <div class="gft"><button class="add" data-add="${g.id}">+ 添加款项</button><span class="sm">应收 <b>${money(s.total)}</b> · 已收 <b class="g">${money(s.recv)}</b> · 未收 <b>${money(s.owe)}</b></span></div>
    </div>
  </div>`;
}

function render(){ el('groups').innerHTML=groups.map(groupHTML).join(''); }

document.addEventListener('click',ev=>{
  const tgl=ev.target.closest('[data-toggle]');
  const add=ev.target.closest('[data-add]');
  const typ=ev.target.closest('[data-type]');
  const act=ev.target.closest('[data-act]');
  if(add){ const gid=add.dataset.add; entry={srcGroup:gid, target:gid, type:'received', desc:'', amount:''}; render(); return; }
  if(typ){ if(entry){entry.type=typ.dataset.type; render();} return; }
  if(act){
    if(act.dataset.act==='cancel'){ entry=null; render(); return; }
    if(act.dataset.act==='save'){
      const amt=parseFloat(entry.amount)||0;
      if(!entry.desc){alert('请填描述');return;}
      if(amt<=0){alert('请填金额');return;}
      const g=groups.find(x=>x.id===entry.target);
      g.items.push({desc:entry.desc, amount:amt, status:entry.type});
      entry=null; render(); return;
    }
  }
  if(tgl && !ev.target.closest('.entry')){ const g=groups.find(x=>x.id===tgl.dataset.toggle); g.collapsed=!g.collapsed; render(); return; }
});
document.addEventListener('input',ev=>{
  const f=ev.target.dataset.e; if(f&&entry){ entry[f]=ev.target.value; }
});
document.addEventListener('change',ev=>{
  if(ev.target.dataset.e==='target'&&entry){ entry.target=ev.target.value; render(); }
});
render();
</script>
</body>
</html>
