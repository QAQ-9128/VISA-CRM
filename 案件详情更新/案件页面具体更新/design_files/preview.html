<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>签证 CRM · 全站重设计</title>
<link rel="stylesheet" href="crm-dashboard/crm.css"/>
<link rel="stylesheet" href="crm-dashboard/crm-app.css"/>
<style>
  html,body,#root{height:100%;margin:0}
  body{background:var(--canvas)}
  /* 产品外壳:满屏,侧栏固定,内容区滚动 */
  .app{height:100vh}
  .main{overflow:hidden}
  .scroll{flex:1;overflow:auto}
  .scroll::-webkit-scrollbar{width:10px}
  .scroll::-webkit-scrollbar-thumb{background:#d7dced;border-radius:99px;border:3px solid var(--canvas)}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#3b6bff"/>
    <rect x="20" y="22" width="16" height="56" rx="4" fill="#dbe6ff"/>
    <rect x="42" y="22" width="38" height="13" rx="3" fill="#fff"/>
    <rect x="42" y="42" width="18" height="16" rx="3" fill="#cfe0ff"/>
    <rect x="62" y="42" width="18" height="16" rx="3" fill="#cfe0ff"/>
    <rect x="42" y="63" width="38" height="15" rx="3" fill="#cfe0ff"/>
  </svg>
</template>

<script type="text/babel" src="crm-dashboard/crm-shared.jsx"></script>
<script type="text/babel" src="crm-dashboard/crm-layoutA.jsx"></script>
<script type="text/babel" src="crm-dashboard/crm-app-data.jsx"></script>
<script type="text/babel" src="crm-dashboard/crm-app.jsx"></script>
<script type="text/babel">
  const { CRMRouter } = window;
  ReactDOM.createRoot(document.getElementById('root')).render(<CRMRouter/>);
</script>
</body>
</html>
