<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../dist/assets/index-CKh6kkh3.css">
</head>
<body class="text-body antialiased" style="background:#e8f0ea">
<main class="grid min-h-screen place-items-center p-6">
  <form class="w-full max-w-[620px] rounded-[22px] bg-white p-6 [box-shadow:0_30px_80px_-30px_rgba(0,0,0,.4)]">
    <div class="flex items-start justify-between">
      <div>
        <h2 class="font-serif text-[22px] font-bold text-ink">新建提醒</h2>
        <p class="mt-1 text-[13px] text-faint">提醒必须挂在一个已有案件上 · 不在这里新建案件</p>
      </div>
      <button type="button" class="grid size-8 place-items-center rounded-full text-muted hover:bg-surface-2">✕</button>
    </div>

    <div class="mt-5">
      <div class="mb-2 flex items-center gap-2 text-[15px] font-bold text-ink">
        <span class="grid size-6 place-items-center rounded-full bg-emerald-600 text-[12px] font-bold text-white">1</span>
        关联案件 <span class="text-[13px] font-semibold text-rose-500">*必选</span>
      </div>
      <div class="flex items-center gap-3 rounded-[14px] border border-emerald-200 bg-emerald-50/60 px-4 py-3">
        <span class="text-emerald-700">✓</span>
        <span class="min-w-0 flex-1 truncate text-[15px] font-semibold text-ink">谢华 <span class="ml-1 text-[13px] font-normal text-faint tabular-nums">99710250</span></span>
        <span class="shrink-0 rounded-full bg-white px-2.5 py-1 text-[12.5px] font-bold text-emerald-700">186 ENS（TRT）</span>
        <button type="button" class="shrink-0 text-[13px] font-semibold text-brand-700">更换</button>
      </div>
    </div>

    <div class="mt-5">
      <div class="mb-2 flex items-center gap-2 text-[15px] font-bold text-ink">
        <span class="grid size-6 place-items-center rounded-full bg-emerald-600 text-[12px] font-bold text-white">2</span>
        提醒规则（自定义）
      </div>
      <div class="space-y-1.5">
        <label class="block text-[13.5px] font-semibold text-body">提醒内容</label>
        <textarea rows="3" class="block w-full rounded-[14px] border border-line-2 bg-white px-3.5 py-2.5 text-[15px] text-ink outline-none" placeholder="提醒内容，自己写… 例：更新同居材料 / 2 年后办 186 TRT"></textarea>
      </div>
      <div class="mt-3 flex flex-wrap items-end gap-2">
        <div class="w-[88px] space-y-1.5"><label class="block text-[13.5px] font-semibold text-body">数字</label><input class="block h-12 w-full rounded-[14px] border border-line-2 bg-white px-3.5 text-[15px] text-ink" value="2"></div>
        <div class="w-[100px] space-y-1.5"><label class="block text-[13.5px] font-semibold text-body">单位</label><select class="block h-12 w-full appearance-none rounded-[14px] border border-line-2 bg-white px-3.5 pr-10 text-[15px] text-ink"><option>年</option></select></div>
        <span class="pb-3 text-[13px] text-faint">（天 / 月 / 年）后提醒</span>
      </div>
      <div class="mt-3 w-[180px] space-y-1.5"><label class="block text-[13.5px] font-semibold text-body">重复</label><select class="block h-12 w-full appearance-none rounded-[14px] border border-line-2 bg-white px-3.5 pr-10 text-[15px] text-ink"><option>永不</option></select></div>
      <p class="mt-3 text-[12.5px] leading-relaxed text-faint">完全自己写，不分按状态 / 按日期。例：每 3 个月提醒更新同居材料、2 年后提醒办 186 TRT。</p>
    </div>

    <div class="mt-5 flex justify-end gap-2 border-t border-line pt-4">
      <button type="button" class="inline-flex h-11 items-center justify-center rounded-[14px] px-4 text-[15px] font-semibold text-muted">取消</button>
      <button type="submit" class="inline-flex h-11 items-center justify-center rounded-[14px] bg-brand-700 px-5 text-[15px] font-semibold text-white">保存提醒</button>
    </div>
  </form>
</main>
</body>
</html>
