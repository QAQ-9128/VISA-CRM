<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../dist/assets/index-Dy0y7Hcj.css">
</head>
<body class="text-body antialiased" style="background:#e8f0ea">
<main style="display:grid;place-items:start center;padding:40px 0;min-height:100vh">
  <div class="rounded-[20px] border border-line bg-white" style="width:600px;box-shadow:0 30px 70px -28px rgba(40,90,60,.42)">
    <!-- 标题栏 -->
    <div class="flex items-center gap-2 border-b border-line px-5 py-3.5">
      <span class="text-faint">⠿</span>
      <h2 class="font-serif text-[18px] font-bold text-ink">新建提醒</h2>
      <span class="rounded-full bg-surface-2 px-2 py-0.5 text-[11px] font-semibold text-muted">↔ 可拖动</span>
      <button class="ml-auto grid size-7 place-items-center rounded-full text-muted">✕</button>
    </div>

    <div class="p-5">
      <!-- ① 关联案件（已选） -->
      <div class="mb-2 flex items-center gap-2 text-[15px] font-bold text-ink">
        <span class="grid size-6 place-items-center rounded-full bg-emerald-600 text-[12px] font-bold text-white">1</span>
        关联案件 <span class="text-[13px] font-semibold text-rose-500">*必选</span>
      </div>
      <div class="flex items-center gap-3 rounded-[14px] border border-emerald-200 bg-emerald-50/60 px-4 py-3">
        <span class="text-emerald-700">✓</span>
        <span class="min-w-0 flex-1 truncate text-[15px] font-semibold text-ink">谢华 <span class="ml-1 text-[13px] font-normal text-faint tabular-nums">99710250</span></span>
        <span class="shrink-0 rounded-full bg-white px-2.5 py-1 text-[12.5px] font-bold text-emerald-700">186/TRT</span>
        <button class="shrink-0 text-[13px] font-semibold text-brand-700">更换</button>
      </div>

      <!-- ② 提醒规则 -->
      <div class="mb-3 mt-6 flex items-center gap-2 text-[15px] font-bold text-ink">
        <span class="grid size-6 place-items-center rounded-full bg-emerald-600 text-[12px] font-bold text-white">2</span>
        提醒规则
      </div>

      <!-- 内容 -->
      <label class="mb-1.5 block text-[13px] font-semibold text-muted">内容</label>
      <textarea rows="2" class="w-full resize-none rounded-[12px] border border-[#e6ece8] bg-[#f8fbf9] px-3.5 py-2.5 text-[15px] text-ink outline-none placeholder:text-faint">2 年后办 186 TRT</textarea>

      <!-- 提醒时间 -->
      <label class="mt-4 mb-1.5 block text-[13px] font-semibold text-muted">提醒时间</label>
      <div class="rounded-[14px] border border-[#e6ece8] bg-[#f8fbf9] p-3">
        <div class="flex flex-wrap items-center gap-2 text-[14px] text-muted">
          <input type="date" value="2026-06-16" class="h-11 w-[170px] rounded-[12px] border border-[#e6ece8] bg-white px-3.5 text-[15px] font-semibold text-ink outline-none">
          <span>起</span>
          <input type="number" value="2" class="h-11 w-[72px] rounded-[12px] border border-[#e6ece8] bg-white px-3.5 text-center text-[15px] font-semibold text-ink outline-none">
          <select class="h-11 w-[78px] rounded-[12px] border border-[#e6ece8] bg-white px-3.5 text-[15px] font-semibold text-ink outline-none"><option>年</option></select>
          <span>后</span>
        </div>
        <div class="mt-2.5 rounded-[10px] bg-emerald-50 px-3 py-2 text-[13px] text-emerald-800">
          <span class="mr-1">🔔</span>将于 <b class="font-bold text-emerald-900">2028年6月16日(周六)</b> 提醒
        </div>
      </div>

      <!-- 重复 -->
      <label class="mt-4 mb-1.5 block text-[13px] font-semibold text-muted">重复</label>
      <select class="h-11 w-full rounded-[12px] border border-[#e6ece8] bg-[#f8fbf9] px-3.5 text-[15px] text-ink outline-none"><option>不重复</option></select>

      <div class="mt-5 flex justify-end gap-2 border-t border-line pt-4">
        <button class="rounded-[12px] px-4 py-2 text-[14px] font-semibold text-muted">取消</button>
        <button class="rounded-[12px] bg-emerald-600 px-4 py-2 text-[14px] font-semibold text-white">保存提醒</button>
      </div>
    </div>
  </div>
</main>
</body>
</html>
