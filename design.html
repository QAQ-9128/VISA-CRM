<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>签证 CRM · 仪表盘设计稿</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>html,body{margin:0;height:100%}body{background:var(--bg)}#root{min-height:100%}</style>

  <!-- React + Babel (CDN, 仅设计预览用) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

  <!-- mock 数据 → window.CRM -->
  <script src="./data.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- 全屏响应式仪表盘 -->
  <script type="text/babel">
    const { useState } = React;
    const C = window.CRM;

    /* ---------- 图标 ---------- */
    const P = (d, k) => <path key={k} d={d} />;
    const ICONS = {
      grid:      ['M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z'],
      briefcase: ['M3 8h18v12H3zM8 8V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2','M3 13h18'],
      check:     ['M9 12l2 2 4-4','M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18z'],
      wallet:    ['M3 7h15a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h11','M17 13h.01'],
      alert:     ['M12 3l9 16H3z','M12 10v4','M12 17h.01'],
      users:     ['M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2','M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8','M22 21v-2a4 4 0 0 0-3-3.87','M16 3.13a4 4 0 0 1 0 7.75'],
      folder:    ['M3 7a2 2 0 0 1 2-2h4l2 3h8a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z'],
      file:      ['M14 3v5h5','M7 3h7l5 5v11a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z'],
      dollar:    ['M12 2v20','M17 6H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6'],
      calendar:  ['M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1z','M4 9h16','M8 3v4M16 3v4'],
      bell:      ['M6 9a6 6 0 1 1 12 0c0 5 2 6 2 6H4s2-1 2-6','M10 20a2 2 0 0 0 4 0'],
      search:    ['M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16z','M21 21l-4-4'],
      plus:      ['M12 5v14M5 12h14'],
      settings:  ['M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z','M19 12a7 7 0 0 0-.1-1l2-1.6-2-3.4-2.4 1a7 7 0 0 0-1.7-1L14.5 2h-5l-.3 2.4a7 7 0 0 0-1.7 1l-2.4-1-2 3.4 2 1.6a7 7 0 0 0 0 2l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 1.7 1L9.5 22h5l.3-2.4a7 7 0 0 0 1.7-1l2.4 1 2-3.4-2-1.6c.06-.33.1-.66.1-1z'],
      logout:    ['M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4','M16 17l5-5-5-5','M21 12H9'],
      chart:     ['M3 3v18h18','M7 14l3-3 3 3 5-6'],
      arrowUp:   ['M12 19V5','M6 11l6-6 6 6'],
      arrowDown: ['M12 5v14','M6 13l6 6 6-6'],
      chevD:     ['M6 9l6 6 6-6'],
      chevR:     ['M9 6l6 6-6 6'],
      menu:      ['M4 7h16M4 12h16M4 17h16'],
    };
    function Icon({ n, s = 20, sw = 1.8, ...rest }) {
      return (
        <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor"
          strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" {...rest}>
          {(ICONS[n] || []).map(P)}
        </svg>
      );
    }

    /* ---------- 侧边栏 (Layout B) ---------- */
    const NAV = [
      { ic:'grid', t:'仪表盘', active:true },
      { ic:'users', t:'客户' },
      { ic:'folder', t:'案件' },
      { ic:'chart', t:'递交进度' },
      { ic:'file', t:'文档' },
      { ic:'dollar', t:'财务' },
      { ic:'briefcase', t:'雇主' },
    ];
    function Sidebar() {
      return (
        <aside className="sidebar">
          <div className="side-brand">
            <span className="brand-mark"><Icon n="briefcase" s={17} sw={2} /></span>
            VisaCRM
          </div>
          <div className="side-sec">主菜单</div>
          {NAV.map((x) => (
            <div key={x.t} className={'side-item' + (x.active ? ' active' : '')}>
              <Icon n={x.ic} s={19} /> {x.t}
            </div>
          ))}
          <div className="side-sec">系统</div>
          <div className="side-item"><Icon n="settings" s={19} /> 设置</div>
          <div className="side-foot"><Icon n="logout" s={19} /> 退出登录</div>
        </aside>
      );
    }

    /* ---------- 头部 ---------- */
    function Header() {
      return (
        <div className="dash-header" style={{ display:'flex', alignItems:'center', gap:16, flexWrap:'wrap' }}>
          <div className="dash-greet">
            <h1 className="hello">你好，<b>{C.user.name}</b> 👋</h1>
            <p className="hello-sub">{C.user.sub}</p>
          </div>
          <div className="search">
            <Icon n="search" s={18} /> 搜索客户 / 案件…
          </div>
          <button className="btn-primary"><Icon n="plus" s={18} sw={2} /> 新建客户</button>
          <div className="m-ic" style={{ position:'relative' }}>
            <Icon n="bell" s={20} />
            <span style={{ position:'absolute', top:9, right:10, width:8, height:8, borderRadius:4, background:'var(--red)', boxShadow:'0 0 0 2px #fff' }} />
          </div>
        </div>
      );
    }

    /* ---------- 统计卡 ---------- */
    function Stat({ s }) {
      const tIc = s.dir === 'up' ? 'arrowUp' : s.dir === 'down' ? 'arrowDown' : 'chevR';
      return (
        <div className="stat">
          <div className="stat-top">
            <div className="stat-ic"><Icon n={s.icon} s={22} /></div>
            <span className={'trend ' + s.dir}>
              {s.dir !== 'flat' && <Icon n={tIc} s={13} sw={2.4} />} {s.trend}
            </span>
          </div>
          <div>
            <div className="stat-val num">{s.value}</div>
            <div className="stat-lab">{s.label}</div>
          </div>
        </div>
      );
    }

    /* ---------- 阶段横条图 ---------- */
    function StageBars() {
      const max = Math.max(...C.stages.map((s) => s.value));
      return (
        <div className="card card-pad" style={{ flex:'1 1 380px', minWidth:0 }}>
          <div className="card-head">
            <div className="card-title">案件阶段分布</div>
            <div className="card-link">查看全部 <Icon n="chevR" s={13} sw={2.2} /></div>
          </div>
          <div className="hbar">
            {C.stages.map((s) => (
              <div className="hbar-row" key={s.key}>
                <span className="hk">{s.label}</span>
                <div className="hbar-track">
                  <div className="hbar-fill" style={{ width:(s.value/max*100)+'%', background:s.color }} />
                </div>
                <span className="hv num">{s.value}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ---------- 收付环形图 ---------- */
    function Donut() {
      const { total, parts } = C.split;
      const r = 52, c = 2 * Math.PI * r;
      let acc = 0;
      return (
        <div className="card card-pad" style={{ flex:'1 1 320px', minWidth:0 }}>
          <div className="card-head">
            <div className="card-title">收付构成</div>
            <div className="card-link"><Icon n="chevR" s={15} /></div>
          </div>
          <div className="donut-wrap">
            <div style={{ position:'relative', width:140, height:140, flex:'none' }}>
              <svg width="140" height="140" viewBox="0 0 140 140" style={{ transform:'rotate(-90deg)' }}>
                <circle cx="70" cy="70" r={r} fill="none" stroke="var(--bg-2)" strokeWidth="16" />
                {parts.map((p) => {
                  const len = (p.value/total)*c;
                  const el = <circle key={p.label} cx="70" cy="70" r={r} fill="none" stroke={p.color}
                    strokeWidth="16" strokeLinecap="round"
                    strokeDasharray={`${len} ${c-len}`} strokeDashoffset={-acc} />;
                  acc += len;
                  return el;
                })}
              </svg>
              <div style={{ position:'absolute', inset:0, display:'grid', placeItems:'center' }}>
                <div className="donut-center" style={{ textAlign:'center' }}>
                  <div style={{ fontSize:30, fontWeight:700, lineHeight:1 }}>{total}</div>
                  <div style={{ fontSize:11.5, color:'var(--text-3)', marginTop:3 }}>笔交易</div>
                </div>
              </div>
            </div>
            <div className="donut-legend">
              {parts.map((p) => (
                <div className="legend-row" key={p.label}>
                  <span className="dot" style={{ background:p.color }} />
                  <span className="lk">{p.label}</span>
                  <span className="lv num">{p.value}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ---------- 待审批表 ---------- */
    function Approvals() {
      const [done, setDone] = useState({});
      return (
        <div className="card card-pad">
          <div className="card-head">
            <div className="card-title">待审批事项 <span style={{ color:'var(--text-3)', fontWeight:400, fontSize:13 }}>· {C.approvals.length}</span></div>
            <div className="card-link">全部 <Icon n="chevR" s={13} sw={2.2} /></div>
          </div>
          <div className="tbl-wrap">
          <table className="tbl">
            <thead><tr>
              <th>客户</th><th>类型</th><th>关联</th><th>日期</th><th>说明</th><th style={{ textAlign:'right' }}>操作</th>
            </tr></thead>
            <tbody>
              {C.approvals.map((a) => (
                <tr key={a.id} style={ done[a.id] ? { opacity:.4 } : null }>
                  <td><div className="cust">
                    <span className={'ava sm ava-h'+a.h}>{a.ini}</span>
                    <div><div className="nm">{a.nm}</div><div className="id num">{a.id}</div></div>
                  </div></td>
                  <td>{a.type}</td>
                  <td><span className="badge st-nom"><span className="dot" />{a.tag}</span></td>
                  <td className="num" style={{ color:'var(--text-2)' }}>{a.date}</td>
                  <td style={{ color:'var(--text-2)' }}>{a.note}</td>
                  <td><div className="td-actions">
                    <span className="act ok" onClick={() => setDone((d) => ({ ...d, [a.id]:1 }))}><Icon n="check" s={14} sw={2.2} /> 通过</span>
                    <span className="act no" onClick={() => setDone((d) => ({ ...d, [a.id]:1 }))}>驳回</span>
                  </div></td>
                </tr>
              ))}
            </tbody>
          </table>
          </div>
        </div>
      );
    }

    /* ---------- 通用列表卡 ---------- */
    function ListCard({ data, kind }) {
      return (
        <div className="card card-pad" style={{ flex:'1 1 0', minWidth:0 }}>
          <div className="list-head">
            <div className="card-title">{data.title}</div>
            <span className="date-chip"><Icon n="calendar" s={13} /> {data.date}</span>
          </div>
          <div>
            {data.rows.map((r, i) => (
              <div className="lrow" key={i}>
                <span className={'ava sm ava-h'+r.h}>{r.ini}</span>
                <div className="grow">
                  <div className="nm">{r.nm}</div>
                  <div className="meta">{r.meta}</div>
                </div>
                {kind === 'badge'
                  ? <span className={'badge '+r.cls}><span className="dot" />{r.badge}</span>
                  : <span className={'day '+r.dcls}>{r.day}</span>}
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ---------- 移动端底部 Tab 栏 ---------- */
    const TABS = [
      { ic:'grid', t:'首页', active:true }, { ic:'users', t:'客户' },
      { ic:'folder', t:'案件' }, { ic:'dollar', t:'财务' }, { ic:'settings', t:'我的' },
    ];
    function MobileTabBar() {
      return (
        <nav className="mob-tabbar">
          {TABS.map((t) => (
            <div key={t.t} className={'tab'+(t.active?' active':'')}>
              <span className="ti"><Icon n={t.ic} s={22} /></span>{t.t}
            </div>
          ))}
        </nav>
      );
    }

    /* ---------- 全屏响应式仪表盘 ---------- */
    function Dashboard() {
      return (
        <div className="dash dash-live">
          <Sidebar />
          <main className="dash-main">
            <Header />
            <div className="stat-grid">
              {C.stats.map((s) => <Stat key={s.label} s={s} />)}
            </div>
            <div className="chart-row">
              <StageBars />
              <Donut />
            </div>
            <Approvals />
            <div className="list-row">
              <ListCard data={C.recent} kind="badge" />
              <ListCard data={C.expiry} kind="day" />
              <ListCard data={C.overdue} kind="day" />
            </div>
          </main>
          <MobileTabBar />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
  </script>
</body>
</html>
